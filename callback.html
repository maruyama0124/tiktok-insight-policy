<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TikTok Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-1: #06070a;
      --bg-2: #111318;
      --accent: #25f4ee;
      --accent-2: #fe2c55;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --card: rgba(15, 23, 42, 0.75);
      --border: rgba(148, 163, 184, 0.2);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Space Grotesk", "DM Sans", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(1100px 560px at 8% 8%, rgba(37, 244, 238, 0.25), transparent 60%),
        radial-gradient(900px 520px at 92% 18%, rgba(254, 44, 85, 0.25), transparent 55%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    .wrapper {
      width: min(980px, 100%);
      display: grid;
      gap: 24px;
      animation: fadeIn 0.7s ease-out;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.6);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: 24px;
      margin: 0;
      letter-spacing: 0.4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      animation: slideUp 0.6s ease-out;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    pre {
      margin: 0;
      padding: 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px dashed rgba(148, 163, 184, 0.35);
      font-size: 13px;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(2, 6, 23, 0.6);
      color: var(--text);
      font-size: 14px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    button {
      border: none;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #7cf8f4);
      color: #06070a;
      box-shadow: 0 14px 30px rgba(37, 244, 238, 0.3);
    }

    .secondary {
      background: linear-gradient(135deg, var(--accent-2), #ff8fb1);
      color: #06070a;
      box-shadow: 0 14px 30px rgba(254, 44, 85, 0.3);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="wrapper">
    <section class="header">
      <div>
        <h1>TikTok Callback</h1>
        <div class="pill">Auth code receiver</div>
      </div>
      <div class="pill">Secure handoff</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>認可コード</h2>
        <pre id="code">読み込み中...</pre>
        <p class="hint">URLのcodeを自動取得します。</p>
      </div>
      <div class="card">
        <h2>APIへ送信</h2>
        <label for="codeInput" class="hint">コードを手動で上書きできます</label>
        <textarea id="codeInput" placeholder="ここにコードを貼り付け"></textarea>
        <div class="actions">
          <button id="runBtn" class="primary">送信して取得</button>
          <button id="loginBtn" class="secondary">もう一度ログインする</button>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>送信ステータス</h2>
        <pre id="status">waiting...</pre>
      </div>
      <div class="card">
        <h2>取得ステータス</h2>
        <pre id="fetchStatus">未実行</pre>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    let code = params.get("code");
    if (!code) {
      const match = window.location.href.match(/[?&]code=([^&]+)/);
      code = match ? match[1] : null;
    }
    if (code) {
      try {
        code = decodeURIComponent(code);
      } catch (err) {
        code = code;
      }
    }
    const apiBase = "https://tiktok-analytics-production.up.railway.app";
    const runBtn = document.getElementById("runBtn");
    const loginBtn = document.getElementById("loginBtn");
    const codeInput = document.getElementById("codeInput");
    const statusEl = document.getElementById("status");
    const fetchStatusEl = document.getElementById("fetchStatus");

    document.getElementById("code").innerText = code ?? "コードが見つかりません";
    if (code) {
      codeInput.value = code;
    }
    const defaultApi = apiBase;

    async function sendCode() {
      const codeValue = codeInput.value.trim();
      if (!codeValue) {
        statusEl.innerText = "コードが必要です";
        return { ok: false };
      }
      statusEl.innerText = "送信中...";
      try {
        const res = await fetch(`${apiBase}/auth/callback`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: codeValue }),
        });
        const result = await res.json().catch(() => ({}));
        const pretty = JSON.stringify(result, null, 2);
        statusEl.innerText = `完了: ${res.status}\n${pretty}`;
        return { ok: res.ok };
      } catch (err) {
        statusEl.innerText = `失敗: ${String(err)}`;
        return { ok: false };
      }
    }

    async function fetchLatest() {
      fetchStatusEl.innerText = "取得中...";
      try {
        const res = await fetch(`${apiBase}/auth/fetch-latest`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        const result = await res.json().catch(() => ({}));
        const pretty = JSON.stringify(result, null, 2);
        fetchStatusEl.innerText = `完了: ${res.status}\n${pretty}`;
      } catch (err) {
        fetchStatusEl.innerText = `失敗: ${String(err)}`;
      }
    }

    async function runAll() {
      runBtn.disabled = true;
      runBtn.style.display = "none";
      const result = await sendCode();
      if (result && result.ok) {
        await fetchLatest();
      }
    }

    runBtn.addEventListener("click", runAll);

    function startLogin() {
      const authUrl = "https://www.tiktok.com/v2/auth/authorize/?client_key=sbawmzotbr0r0mm3xf&response_type=code&scope=user.info.basic%2Cuser.info.stats%2Cuser.info.profile%2Cvideo.list&redirect_uri=https%3A%2F%2Fmaruyama0124.github.io%2Ftiktok-insight-policy%2Fcallback.html&state=rebear_tiktok_insight";
      window.location.href = authUrl;
    }

    loginBtn.addEventListener("click", startLogin);
  </script>
</body>
</html>
